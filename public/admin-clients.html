<!DOCTYPE html>
<html class="light" lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Juma - Clientes</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "background": "#fdf9f4",
            "surface-container": "#f1ede8",
            "error": "#ba1a1a",
            "tertiary": "#006a69",
            "tertiary-container": "#00acab",
            "on-surface-variant": "#59413c",
            "primary-container": "#ff6b4a",
            "surface-container-low": "#f7f3ee",
            "surface-container-high": "#ece7e3",
            "surface-container-highest": "#e6e2dd",
            "surface-container-lowest": "#ffffff",
            "on-surface": "#1c1c19",
            "on-primary": "#ffffff",
            "outline-variant": "#e1bfb8",
            "primary": "#ff6b4a",
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Work Sans"],
          },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Work Sans', sans-serif; }
    h1, h2, h3, h4, .font-headline { font-family: 'Manrope', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0 !important; } }
  </style>
</head>
<body class="bg-background text-on-surface min-h-screen">

  <!-- Sidebar -->
  <aside class="sidebar fixed left-0 top-0 h-full flex flex-col p-4 w-64 bg-stone-100 border-r-0 z-50">
    <div class="flex items-center gap-3 mb-10 px-2">
      <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-on-primary">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">psychology</span>
      </div>
      <div>
        <h1 class="text-2xl font-bold text-stone-900 leading-tight">Juma</h1>
        <p class="text-xs font-medium text-stone-500 tracking-tight">Assistente do Jonathan</p>
      </div>
    </div>
    <nav class="flex-1 space-y-1">
      <a class="flex items-center gap-3 px-4 py-3 text-stone-600 hover:bg-stone-200 rounded-lg font-semibold transition-colors" href="/admin">
        <span class="material-symbols-outlined">psychology</span>
        <span>Aprendizados</span>
      </a>
      <a class="flex items-center gap-3 px-4 py-3 bg-[#ff6b4a]/10 text-[#ff6b4a] rounded-lg font-semibold transition-colors" href="/admin/clients">
        <span class="material-symbols-outlined">group</span>
        <span>Clientes</span>
      </a>
    </nav>
  </aside>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black/50 z-[100] hidden items-center justify-center p-6" onclick="closeModal(event)">
    <div class="bg-surface-container-lowest rounded-2xl w-full max-w-xl max-h-[80vh] flex flex-col shadow-2xl" onclick="event.stopPropagation()">
      <div class="flex justify-between items-center p-6 border-b border-outline-variant/20">
        <div>
          <h3 class="font-headline font-bold text-lg" id="modal-title">Historico</h3>
          <p class="text-xs text-on-surface-variant mt-1" id="modal-subtitle"></p>
        </div>
        <button onclick="document.getElementById('modal').classList.add('hidden');document.getElementById('modal').classList.remove('flex')" class="p-2 text-on-surface-variant hover:text-on-surface hover:bg-surface-container-high rounded-full transition-colors">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="flex-1 overflow-y-auto p-6 space-y-3" id="modal-body"></div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main-content ml-64 min-h-screen">
    <div class="p-10 space-y-12">

      <!-- Page Header -->
      <section>
        <h2 class="text-4xl font-extrabold tracking-tight font-headline text-on-surface">Clientes</h2>
        <p class="text-on-surface-variant font-body mt-2">Memoria da Juma sobre cada cliente.</p>
      </section>

      <!-- Stats -->
      <section class="grid grid-cols-1 md:grid-cols-3 gap-6" id="stats"></section>

      <!-- Search -->
      <section>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-on-surface-variant">
            <span class="material-symbols-outlined text-sm">search</span>
          </span>
          <input id="search" oninput="filterClients(this.value)" class="pl-12 pr-4 py-3 bg-surface-container-lowest border border-outline-variant/20 rounded-xl text-sm focus:ring-2 focus:ring-[#ff6b4a] w-full max-w-md transition-all" placeholder="Buscar por resumo ou ID do cliente..." type="text"/>
        </div>
      </section>

      <!-- Client Grid -->
      <section class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="client-grid"></section>

    </div>
  </main>

  <script>
    let allClients = [];

    async function load() {
      try {
        const res = await fetch('/admin/clients/data');
        const data = await res.json();
        allClients = data.clients || [];
        render();
      } catch {
        document.getElementById('client-grid').innerHTML =
          '<div class="col-span-full text-center py-16 text-on-surface-variant"><span class="material-symbols-outlined text-5xl block mb-4">error</span><p>Erro ao carregar dados</p></div>';
      }
    }

    function render() {
      const totalClients = allClients.length;
      const totalMsgs = allClients.reduce((s, c) => s + c.total_messages, 0);
      const recent = allClients.filter(c => {
        const d = new Date(c.last_active);
        return (Date.now() - d) < 24 * 60 * 60 * 1000;
      }).length;

      document.getElementById('stats').innerHTML = `
        <div class="bg-surface-container-low p-6 rounded-xl relative overflow-hidden hover:bg-surface-container-high transition-colors">
          <div class="absolute top-0 right-0 w-24 h-24 bg-[#ff6b4a] opacity-5 blur-2xl rounded-full -mr-10 -mt-10"></div>
          <p class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant mb-1">Total Clientes</p>
          <h3 class="text-5xl font-extrabold text-[#ff6b4a] font-headline tracking-tighter">${totalClients}</h3>
        </div>
        <div class="bg-surface-container-low p-6 rounded-xl relative overflow-hidden hover:bg-surface-container-high transition-colors">
          <div class="absolute top-0 right-0 w-24 h-24 bg-tertiary-container opacity-5 blur-2xl rounded-full -mr-10 -mt-10"></div>
          <p class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant mb-1">Total Mensagens</p>
          <h3 class="text-5xl font-extrabold text-tertiary font-headline tracking-tighter">${totalMsgs}</h3>
        </div>
        <div class="bg-surface-container-low p-6 rounded-xl relative overflow-hidden hover:bg-surface-container-high transition-colors">
          <div class="absolute top-0 right-0 w-24 h-24 bg-tertiary opacity-5 blur-2xl rounded-full -mr-10 -mt-10"></div>
          <p class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant mb-1">Ativos (24h)</p>
          <h3 class="text-5xl font-extrabold text-on-surface font-headline tracking-tighter">${recent}</h3>
        </div>
      `;

      renderCards(allClients);
    }

    function renderCards(clients) {
      const grid = document.getElementById('client-grid');
      if (clients.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-16 text-on-surface-variant">
            <span class="material-symbols-outlined text-5xl block mb-4">group</span>
            <p class="text-sm">Nenhum cliente com memoria ainda. Conforme clientes conversam com a Juma, eles aparecem aqui.</p>
          </div>`;
        return;
      }

      grid.innerHTML = clients.map(c => {
        const shortId = c.id.substring(0, 8);
        const date = formatDate(c.last_active || c.updated_at);
        const lastMsg = c.last_message ? (c.last_message.length > 50 ? c.last_message.substring(0, 50) + '...' : c.last_message) : '';

        return `
          <div class="bg-surface-container-lowest p-6 rounded-xl hover:bg-surface-container-low transition-colors cursor-pointer border-l-4 border-[#ff6b4a] group" onclick="openHistory('${c.id}')">
            <div class="flex items-center justify-between mb-4">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center">
                  <span class="material-symbols-outlined text-on-surface-variant">person</span>
                </div>
                <div>
                  <p class="text-xs font-mono text-on-surface-variant">${shortId}...</p>
                </div>
              </div>
              <span class="px-3 py-1 bg-[#ff6b4a]/10 text-[#ff6b4a] rounded-full text-xs font-bold">${c.total_messages} msgs</span>
            </div>
            <div class="bg-surface-container-low p-4 rounded-lg border-l-2 border-tertiary mb-4">
              <p class="text-sm text-on-surface leading-relaxed">${c.summary}</p>
            </div>
            ${lastMsg ? `<p class="text-xs text-on-surface-variant italic mb-3">"${lastMsg}"</p>` : ''}
            <div class="flex items-center justify-between">
              <span class="text-xs text-on-surface-variant">${date}</span>
              <span class="material-symbols-outlined text-on-surface-variant text-sm opacity-0 group-hover:opacity-100 transition-opacity">open_in_new</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function filterClients(query) {
      const q = query.toLowerCase();
      renderCards(allClients.filter(c => c.summary.toLowerCase().includes(q) || c.id.toLowerCase().includes(q)));
    }

    async function openHistory(clientId) {
      const modal = document.getElementById('modal');
      const body = document.getElementById('modal-body');
      document.getElementById('modal-title').textContent = 'Historico de Conversa';
      document.getElementById('modal-subtitle').textContent = clientId.substring(0, 8) + '...';
      body.innerHTML = '<div class="text-center py-8 text-on-surface-variant"><span class="material-symbols-outlined animate-spin text-2xl">progress_activity</span></div>';
      modal.classList.remove('hidden');
      modal.classList.add('flex');

      try {
        const res = await fetch('/admin/clients/' + clientId + '/history');
        const data = await res.json();

        if (!data.messages || data.messages.length === 0) {
          body.innerHTML = '<p class="text-center text-on-surface-variant py-8">Sem mensagens</p>';
          return;
        }

        body.innerHTML = data.messages.map(m => {
          const isUser = m.role === 'user';
          const time = formatDate(m.created_at);
          return `
            <div class="${isUser ? 'ml-auto' : 'mr-auto'} max-w-[80%]">
              <div class="px-4 py-2.5 rounded-2xl text-sm leading-relaxed ${
                isUser
                  ? 'bg-[#ff6b4a] text-white rounded-tr-sm'
                  : 'bg-surface-container-high text-on-surface rounded-tl-sm'
              }">
                ${m.content}
              </div>
              <p class="text-[10px] text-on-surface-variant mt-1 ${isUser ? 'text-right' : ''}">${time}</p>
            </div>
          `;
        }).join('');

        body.scrollTop = body.scrollHeight;
      } catch {
        body.innerHTML = '<p class="text-center text-on-surface-variant py-8">Erro ao carregar</p>';
      }
    }

    function closeModal(e) {
      if (e.target === e.currentTarget) {
        e.currentTarget.classList.add('hidden');
        e.currentTarget.classList.remove('flex');
      }
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    load();
  </script>
</body>
</html>
