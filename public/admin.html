<!DOCTYPE html>
<html class="light" lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Juma - Aprendizados</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "background": "#fdf9f4",
            "surface-container": "#f1ede8",
            "error": "#ba1a1a",
            "tertiary": "#006a69",
            "tertiary-container": "#00acab",
            "on-surface-variant": "#59413c",
            "primary-container": "#ff6b4a",
            "surface-container-low": "#f7f3ee",
            "surface-container-high": "#ece7e3",
            "surface-container-highest": "#e6e2dd",
            "surface-container-lowest": "#ffffff",
            "on-surface": "#1c1c19",
            "on-primary": "#ffffff",
            "outline-variant": "#e1bfb8",
            "primary": "#ff6b4a",
            "on-error": "#ffffff",
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Work Sans"],
          },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Work Sans', sans-serif; }
    h1, h2, h3, h4, .font-headline { font-family: 'Manrope', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0 !important; } }
  </style>
</head>
<body class="bg-background text-on-surface min-h-screen">

  <!-- Sidebar -->
  <aside class="sidebar fixed left-0 top-0 h-full flex flex-col p-4 w-64 bg-stone-100 border-r-0 z-50">
    <div class="flex items-center gap-3 mb-10 px-2">
      <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-on-primary">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">psychology</span>
      </div>
      <div>
        <h1 class="text-2xl font-bold text-stone-900 leading-tight">Juma</h1>
        <p class="text-xs font-medium text-stone-500 tracking-tight">Assistente do Jonathan</p>
      </div>
    </div>
    <nav class="flex-1 space-y-1">
      <a class="flex items-center gap-3 px-4 py-3 bg-[#ff6b4a]/10 text-[#ff6b4a] rounded-lg font-semibold transition-colors" href="/admin">
        <span class="material-symbols-outlined">psychology</span>
        <span>Aprendizados</span>
      </a>
      <a class="flex items-center gap-3 px-4 py-3 text-stone-600 hover:bg-stone-200 rounded-lg font-semibold transition-colors" href="/admin/clients">
        <span class="material-symbols-outlined">group</span>
        <span>Clientes</span>
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content ml-64 min-h-screen">
    <div class="p-10 space-y-12">

      <!-- Page Header -->
      <section>
        <h2 class="text-4xl font-extrabold tracking-tight font-headline text-on-surface">Aprendizados</h2>
        <p class="text-on-surface-variant font-body mt-2">Insights que a Juma aprendeu nas conversas com clientes.</p>
      </section>

      <!-- Stats -->
      <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="stats"></section>

      <!-- Charts -->
      <section class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-5 bg-surface-container-lowest p-8 rounded-xl shadow-sm">
          <h4 class="font-headline font-bold text-lg mb-8">Distribuicao de Status</h4>
          <div id="donut-chart" class="flex items-center justify-center relative py-6"></div>
          <div id="donut-legend" class="mt-8 space-y-3"></div>
        </div>
        <div class="lg:col-span-7 bg-surface-container-lowest p-8 rounded-xl shadow-sm">
          <h4 class="font-headline font-bold text-lg mb-10">Categorias</h4>
          <div id="bar-chart" class="space-y-6"></div>
        </div>
      </section>

      <!-- Filters -->
      <section class="flex flex-wrap items-center gap-3" id="filters"></section>

      <!-- Learning Cards -->
      <section class="grid grid-cols-1 gap-4" id="learnings-list"></section>

    </div>
  </main>

  <script>
    let allLearnings = [];

    async function load() {
      try {
        const res = await fetch('/admin/learnings');
        const data = await res.json();
        allLearnings = data.learnings || [];
        render();
      } catch {
        document.getElementById('learnings-list').innerHTML =
          '<div class="text-center py-16 text-on-surface-variant"><span class="material-symbols-outlined text-5xl block mb-4">error</span><p>Erro ao carregar dados</p></div>';
      }
    }

    function render() {
      const eficaz = allLearnings.filter(l => l.type === 'EFICAZ').length;
      const melhorar = allLearnings.filter(l => l.type === 'MELHORAR').length;
      const objecao = allLearnings.filter(l => l.type === 'OBJEÇÃO' || l.type === 'OBJECAO').length;
      const total = allLearnings.length;

      renderStats(total, eficaz, melhorar, objecao);
      renderDonut(total, eficaz, melhorar, objecao);
      renderBars(eficaz, melhorar, objecao);
      renderFilters(total, eficaz, melhorar, objecao);
      renderList(allLearnings);
    }

    function renderStats(total, eficaz, melhorar, objecao) {
      const pctEficaz = total > 0 ? Math.round((eficaz / total) * 100) : 0;
      document.getElementById('stats').innerHTML = `
        <div class="bg-surface-container-low p-6 rounded-xl relative overflow-hidden hover:bg-surface-container-high transition-colors">
          <div class="absolute top-0 right-0 w-24 h-24 bg-[#ff6b4a] opacity-5 blur-2xl rounded-full -mr-10 -mt-10"></div>
          <p class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant mb-1">Total</p>
          <h3 class="text-5xl font-extrabold text-[#ff6b4a] font-headline tracking-tighter">${total}</h3>
        </div>
        <div class="bg-surface-container-low p-6 rounded-xl relative overflow-hidden hover:bg-surface-container-high transition-colors">
          <div class="absolute top-0 right-0 w-24 h-24 bg-tertiary-container opacity-5 blur-2xl rounded-full -mr-10 -mt-10"></div>
          <p class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant mb-1">Eficaz</p>
          <h3 class="text-5xl font-extrabold text-tertiary font-headline tracking-tighter">${eficaz}</h3>
          <div class="mt-4 flex items-center text-xs text-tertiary font-semibold">
            <span class="material-symbols-outlined text-sm mr-1">check_circle</span>
            <span>Taxa de ${pctEficaz}%</span>
          </div>
        </div>
        <div class="bg-surface-container-low p-6 rounded-xl relative overflow-hidden hover:bg-surface-container-high transition-colors">
          <div class="absolute top-0 right-0 w-24 h-24 bg-[#ff6b4a] opacity-5 blur-2xl rounded-full -mr-10 -mt-10"></div>
          <p class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant mb-1">A Melhorar</p>
          <h3 class="text-5xl font-extrabold text-[#ff6b4a] font-headline tracking-tighter">${melhorar}</h3>
          <div class="mt-4 flex items-center text-xs text-[#ff6b4a] font-semibold">
            <span class="material-symbols-outlined text-sm mr-1">edit_note</span>
            <span>Pontos de melhoria</span>
          </div>
        </div>
        <div class="bg-surface-container-low p-6 rounded-xl relative overflow-hidden hover:bg-surface-container-high transition-colors">
          <div class="absolute top-0 right-0 w-24 h-24 bg-error opacity-5 blur-2xl rounded-full -mr-10 -mt-10"></div>
          <p class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant mb-1">Objecoes</p>
          <h3 class="text-5xl font-extrabold text-error font-headline tracking-tighter">${objecao}</h3>
          <div class="mt-4 flex items-center text-xs text-error font-semibold">
            <span class="material-symbols-outlined text-sm mr-1">warning</span>
            <span>Objecoes dos clientes</span>
          </div>
        </div>
      `;
    }

    function renderDonut(total, eficaz, melhorar, objecao) {
      const container = document.getElementById('donut-chart');
      const legend = document.getElementById('donut-legend');
      if (total === 0) {
        container.innerHTML = '<p class="text-on-surface-variant text-sm">Sem dados ainda</p>';
        return;
      }

      const circ = 2 * Math.PI * 80;
      const ePct = eficaz / total, mPct = melhorar / total, oPct = objecao / total;
      const eLen = ePct * circ, mLen = mPct * circ, oLen = oPct * circ;

      container.innerHTML = `
        <svg class="w-48 h-48 transform -rotate-90" viewBox="0 0 192 192">
          <circle cx="96" cy="96" r="80" fill="transparent" stroke="#e6e2dd" stroke-width="24"/>
          <circle cx="96" cy="96" r="80" fill="transparent" stroke="#006a69" stroke-width="24" stroke-dasharray="${eLen} ${circ - eLen}" stroke-dashoffset="0"/>
          <circle cx="96" cy="96" r="80" fill="transparent" stroke="#ff6b4a" stroke-width="24" stroke-dasharray="${mLen} ${circ - mLen}" stroke-dashoffset="${-eLen}"/>
          <circle cx="96" cy="96" r="80" fill="transparent" stroke="#ba1a1a" stroke-width="24" stroke-dasharray="${oLen} ${circ - oLen}" stroke-dashoffset="${-(eLen + mLen)}"/>
        </svg>
        <div class="absolute flex flex-col items-center">
          <span class="text-3xl font-black text-on-surface">${total}</span>
          <span class="text-xs font-semibold text-on-surface-variant uppercase">Total</span>
        </div>
      `;

      legend.innerHTML = `
        <div class="flex justify-between items-center text-sm"><div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-tertiary"></div><span>Eficaz</span></div><span class="font-bold">${Math.round(ePct * 100)}%</span></div>
        <div class="flex justify-between items-center text-sm"><div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-[#ff6b4a]"></div><span>A Melhorar</span></div><span class="font-bold">${Math.round(mPct * 100)}%</span></div>
        <div class="flex justify-between items-center text-sm"><div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-error"></div><span>Objecoes</span></div><span class="font-bold">${Math.round(oPct * 100)}%</span></div>
      `;
    }

    function renderBars(eficaz, melhorar, objecao) {
      const max = Math.max(eficaz, melhorar, objecao, 1);
      document.getElementById('bar-chart').innerHTML = `
        <div class="space-y-2">
          <div class="flex justify-between text-xs font-bold uppercase text-on-surface-variant"><span>Eficaz</span><span>${eficaz}</span></div>
          <div class="h-3 w-full bg-surface-container-highest rounded-full overflow-hidden"><div class="h-full bg-tertiary rounded-full transition-all" style="width:${(eficaz/max)*100}%"></div></div>
        </div>
        <div class="space-y-2">
          <div class="flex justify-between text-xs font-bold uppercase text-on-surface-variant"><span>A Melhorar</span><span>${melhorar}</span></div>
          <div class="h-3 w-full bg-surface-container-highest rounded-full overflow-hidden"><div class="h-full bg-[#ff6b4a] rounded-full transition-all" style="width:${(melhorar/max)*100}%"></div></div>
        </div>
        <div class="space-y-2">
          <div class="flex justify-between text-xs font-bold uppercase text-on-surface-variant"><span>Objecoes</span><span>${objecao}</span></div>
          <div class="h-3 w-full bg-surface-container-highest rounded-full overflow-hidden"><div class="h-full bg-error rounded-full transition-all" style="width:${(objecao/max)*100}%"></div></div>
        </div>
      `;
    }

    function renderFilters(total, eficaz, melhorar, objecao) {
      document.getElementById('filters').innerHTML = `
        <button onclick="filterList('all', this)" class="filter-btn px-5 py-2.5 bg-[#ff6b4a] text-on-primary rounded-full text-sm font-semibold shadow-sm">Todos (${total})</button>
        <button onclick="filterList('EFICAZ', this)" class="filter-btn px-5 py-2.5 bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high rounded-full text-sm font-medium transition-colors">Eficaz (${eficaz})</button>
        <button onclick="filterList('MELHORAR', this)" class="filter-btn px-5 py-2.5 bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high rounded-full text-sm font-medium transition-colors">Melhorar (${melhorar})</button>
        <button onclick="filterList('OBJEÇÃO', this)" class="filter-btn px-5 py-2.5 bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high rounded-full text-sm font-medium transition-colors">Objecoes (${objecao})</button>
      `;
    }

    function filterList(type, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.className = 'filter-btn px-5 py-2.5 bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high rounded-full text-sm font-medium transition-colors';
      });
      btn.className = 'filter-btn px-5 py-2.5 bg-[#ff6b4a] text-on-primary rounded-full text-sm font-semibold shadow-sm';

      if (type === 'all') renderList(allLearnings);
      else renderList(allLearnings.filter(l => l.type === type || (type === 'OBJEÇÃO' && l.type === 'OBJECAO')));
    }

    function renderList(items) {
      const container = document.getElementById('learnings-list');
      if (items.length === 0) {
        container.innerHTML = `
          <div class="text-center py-16 text-on-surface-variant">
            <span class="material-symbols-outlined text-5xl block mb-4">psychology</span>
            <p class="text-sm">Nenhum aprendizado ainda. Conforme clientes conversam com a Juma, ela aprende automaticamente.</p>
          </div>`;
        return;
      }

      container.innerHTML = items.map(l => {
        const isEficaz = l.type === 'EFICAZ';
        const isMelhorar = l.type === 'MELHORAR';
        const borderColor = isEficaz ? 'border-tertiary' : isMelhorar ? 'border-[#ff6b4a]' : 'border-error';
        const badgeBg = isEficaz ? 'bg-tertiary/10 text-tertiary' : isMelhorar ? 'bg-[#ff6b4a]/10 text-[#ff6b4a]' : 'bg-error/10 text-error';
        const label = isEficaz ? 'Eficaz' : isMelhorar ? 'Melhorar' : 'Objecao';
        const date = l.created_at ? new Date(l.created_at).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' }) : '';

        return `
          <div class="bg-surface-container-lowest p-6 rounded-xl hover:bg-surface-container-low transition-colors cursor-pointer border-l-4 ${borderColor}">
            <div class="flex justify-between items-start mb-4">
              <div class="flex items-center gap-3">
                <span class="px-3 py-1 ${badgeBg} rounded-full text-xs font-bold tracking-tight uppercase">${label}</span>
                <span class="text-xs text-on-surface-variant font-medium">${date}</span>
              </div>
            </div>
            <p class="text-on-surface font-medium leading-relaxed max-w-4xl">${l.insight}</p>
          </div>
        `;
      }).join('');
    }

    load();
  </script>
</body>
</html>
