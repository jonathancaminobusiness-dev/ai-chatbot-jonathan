<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juma Chat</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: transparent; }
    #chat-toggle { display: none; }
    #chat-window {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%;
      max-height: 100%;
      border-radius: 0;
      opacity: 1;
      transform: none;
      pointer-events: auto;
    }
    #chat-messages {
      max-height: calc(100vh - 130px);
      min-height: 0;
    }
  </style>
</head>
<body>

  <div id="chat-window">
    <div id="chat-header">
      <div id="chat-header-info">
        <div id="avatar">J</div>
        <div>
          <div id="chat-title">Juma</div>
          <div id="chat-subtitle">Assistente do Jonathan</div>
        </div>
      </div>
      <button id="chat-close" aria-label="Fechar chat">&times;</button>
    </div>

    <div id="chat-messages"></div>

    <form id="chat-form">
      <input type="text" id="chat-input" placeholder="Digite sua mensagem..." autocomplete="off">
      <button type="submit" id="chat-send" aria-label="Enviar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </form>
  </div>

  <script>
    // Widget mode script — chat opens immediately
    (() => {
      const chatClose = document.getElementById('chat-close');
      const chatForm = document.getElementById('chat-form');
      const chatInput = document.getElementById('chat-input');
      const chatMessages = document.getElementById('chat-messages');
      const chatSend = document.getElementById('chat-send');

      let sessionId = localStorage.getItem('juma_session');
      if (!sessionId) {
        sessionId = crypto.randomUUID();
        localStorage.setItem('juma_session', sessionId);
      }

      // Auto-greet
      addMessage('bot', 'Oi \u{1F60A} eu sou a Juma, assistente do Jonathan.');
      setTimeout(() => {
        addMessage('bot', 'Me conta rapidinho, voc\u00EA trabalha com o qu\u00EA?');
      }, 600);

      chatClose.addEventListener('click', () => {
        window.parent.postMessage('juma-close', '*');
      });

      chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = chatInput.value.trim();
        if (!text) return;

        addMessage('user', text);
        chatInput.value = '';
        chatSend.disabled = true;

        const typingEl = showTyping();

        try {
          const res = await fetch('/webhook/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId, message: text }),
          });

          const data = await res.json();
          removeTyping(typingEl);

          if (data.messages && data.messages.length > 0) {
            await showMessagesSequentially(data.messages);
          } else {
            addMessage('bot', 'Desculpa, tive um probleminha aqui. Tenta de novo?');
          }
        } catch {
          removeTyping(typingEl);
          addMessage('bot', 'Ops, algo deu errado. Tenta de novo daqui a pouco?');
        }

        chatSend.disabled = false;
        chatInput.focus();
      });

      async function showMessagesSequentially(messages) {
        for (let i = 0; i < messages.length; i++) {
          if (i > 0) {
            const t = showTyping();
            await delay(700);
            removeTyping(t);
          }
          addMessage('bot', messages[i]);
        }
      }

      function delay(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function addMessage(type, text) {
        const div = document.createElement('div');
        div.className = `message ${type}`;

        if (text.includes('wa.me/')) {
          const parts = text.split(/(<a\s[^>]*wa\.me[^>]*>.*?<\/a>)/i);
          parts.forEach((part) => {
            if (part.match(/<a\s/)) {
              const wrapper = document.createElement('span');
              wrapper.innerHTML = part;
              div.appendChild(wrapper);
            } else if (part.trim()) {
              div.appendChild(document.createTextNode(part));
            }
          });
        } else {
          div.textContent = text;
        }

        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function showTyping() {
        const div = document.createElement('div');
        div.className = 'message typing';
        div.innerHTML = '<span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>';
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return div;
      }

      function removeTyping(el) {
        if (el && el.parentNode) el.parentNode.removeChild(el);
      }
    })();
  </script>
</body>
</html>
